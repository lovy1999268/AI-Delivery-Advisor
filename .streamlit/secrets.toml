# Streamlit Cloud Secrets Configuration
# DO NOT FILL IN VALUES HERE - This file is for CLOUD DEPLOYMENT ONLY
# Local development should use .env file instead
# 
# For Streamlit Cloud deployment:
# 1. Go to https://share.streamlit.io
# 2. Click on your app
# 3. Click "Settings" (gear icon) → "Secrets"
# 4. Enter these values with YOUR ACTUAL credentials:

# For Azure SQL Server: <server>.database.windows.net (include .database.windows.net)
# For on-premises SQL: your-server-ip or your-server.domain.com (include port if not 1433)
# DB_SERVER = "your-server.database.windows.net"

# Database name
# DB_NAME = "AI_Delivery_Advisor"

# SQL Server username (required for Streamlit Cloud)
# Format: username or username@servername (for Azure)
# DB_USER = "your-username"

# SQL Server password (required for Streamlit Cloud)
# DB_PASSWORD = "your-secure-password"

# OpenAI API Key (if using OpenAI)
# OPENAI_API_KEY = "sk-..."
